<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TURN CITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="welcomepage.css">
</head>
<body>

    <div id="preloader">
        <div class="preloader-content">
            <img src="assets/images/logo/u_turn-rp_contant.png" alt="U-Turn Logo" class="loader-logo">
            <h2>U-TURN CITY ROLEPLAY</h2>
            <p>Are you ready to join us?</p>
            <div class="loading-bar"></div> 
        </div>
    </div>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="navbar">
        <div class="logo">
            <img src="assets/images/logo/u_turn-rp.png" alt="U-TURN CITY">
        </div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Join Now</a>
            <a href="#">Application</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="welcome-section">
        <img src="assets/images/logo/u_turn-rp_contant.png" alt="Welcome Image" class="welcome-image">
        <h1>Welcome to <br><span>U-TURN CITY ROLEPLAY</span></h1>
        <p>The Largest FiveM Roleplay Community in Sri Lanka.</p>
        
        <div class="buttons-container">
            <a href="#" class="Get-Started">Get Started</a>
            <a href="#" class="Join-Discord">Join Discord</a>
        </div>
    </div>

    <footer>
        <div class="social-icons">
            <a href="#" target="_blank" class="icon-link discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="#" target="_blank" class="icon-link youtube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="#" target="_blank" class="icon-link facebook">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="#" target="_blank" class="icon-link tik-tok">
                <i class="fa-brands fa-tiktok"></i>
            </a>
        </div>

        <div class="copyright">
            <p>&copy; 2026 U-TURN CITY. All rights reserved.</p>
        </div>
    </footer>

    <script src="welcomepage.js"></script>

</html>
